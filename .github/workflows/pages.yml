name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.18.2'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
          REACT_APP_MAPBOX_TOKEN: ${{ secrets.REACT_APP_MAPBOX_TOKEN }}
          REACT_APP_FUSIONAUTH_APPLICATION_ID: ${{ secrets.REACT_APP_FUSIONAUTH_APPLICATION_ID }}
          REACT_APP_FUSIONAUTH_URL: ${{ vars.REACT_APP_FUSIONAUTH_URL }}
          REACT_APP_MAIN_API_URL: ${{ vars.REACT_APP_MAIN_API_URL }}
          REACT_APP_MDS_URL: ${{ vars.REACT_APP_MDS_URL }}
          REACT_APP_DOCS_GITHUB_API_KEY: ${{ secrets.REACT_APP_DOCS_GITHUB_API_KEY }}

      - name: Prepare Pages artifact
        run: |
          cp CNAME build/CNAME
          touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
