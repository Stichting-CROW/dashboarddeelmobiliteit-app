<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="CROW Dashboard Deelmobiliteit"
    />
    <link href="%PUBLIC_URL%/css/fonts.css" rel="stylesheet" />

    <!--
      Warm up TCP/TLS to the basemap hosts as soon as the HTML is parsed.
      This way MapLibre's first style/sprite/glyph/tile request doesn't have
      to wait for the connection handshake, which shaves ~100-300ms on a
      cold load and helps the basemap appear before any API responses come
      back.
    -->
    <link rel="preconnect" href="https://a.tiles.mapbox.com" crossorigin />
    <link rel="preconnect" href="https://api.mapbox.com" crossorigin />

    <!--
      Paint the map area with the basemap's "land" color BEFORE the JS bundle
      parses and React mounts. This makes the page look like the map is
      already loading from the very first frame, instead of a stark blank
      screen until MapLibre takes over. The color matches the "land" layer
      in `src/components/Map/MapStyles/nine3030.js`, so when MapLibre
      eventually paints its WebGL canvas there is no visible color jump.
    -->
    <style>
      html, body, #root { background-color: hsl(40, 8%, 96%); }
    </style>

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Dashboard Deelmobiliteit | Een project van en voor overheden</title>

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->

    <!-- Service Worker Unregistration Script -->
    <script type="text/javascript">
      // Immediately unregister any existing service workers to prevent reload issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('Unregistered existing service worker to prevent reload issues');
          }
        });
      }
    </script>
